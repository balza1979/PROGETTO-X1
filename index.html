/* Pulsanti MOSTRA / HOME */
.top-btn {

<!--  SCRIPT MOSTRA TUTTO + HOME                                -->

<script>
let mostraTutto = false;
// Nascondi titoli opzionali al primo avvio
document.querySelectorAll(".optional-title").forEach(el => {
  el.classList.add("hidden-optional-title");
});

document.getElementById("mostra_tutto_btn").onclick = function() {
  mostraTutto = !mostraTutto;

  const opzionali = document.querySelectorAll(".optional");
  const titoliOpzionali = document.querySelectorAll(".optional-title");

  // Mostra / nasconde pulsanti
  opzionali.forEach(el => {
    el.style.display = mostraTutto ? "flex" : "none";
  });

  // Mostra / nasconde titoli
  titoliOpzionali.forEach(el => {
    el.classList.toggle("hidden-optional-title", !mostraTutto);
  });

  // Cambia testo del bottone
  this.innerHTML = mostraTutto ? "NASCONDI" : "MOSTRA";
};


document.getElementById("home_btn").onclick = function() {
  window.location.href = "https://balza1979.github.io/Elmi-Documenti/";
};

</script>
<script>
function checkScreenSize() {
  const minWidth = 500; // limite minimo reale
  const warning = document.getElementById("screen-warning");
  const page = document.querySelector(".page");

  if (window.innerWidth < minWidth) {
    warning.style.display = "block";
    page.style.display = "none";
  } else {
    warning.style.display = "none";
    page.style.display = "block";
  }
}

window.addEventListener("resize", checkScreenSize);
window.addEventListener("load", checkScreenSize);
</script>
