<!DOCTYPE html>
<html lang="it">

<!-- ========================================================= -->
<!--  FILE: SCHERMATAPROVA.HTML                                -->
<!--  DATA: 15/04/2026                                          -->
<!--  ORA: 17:44                                                -->
<!--  DESCRIZIONE:                                              -->
<!--  Mockup completo X1 smartphone-first                       -->
<!--  Con barra superiore (MOSTRA / TITOLO / HOME)              -->
<!--  Con pulsanti 2×4 e sezioni MENU → SOTTOMENU → PARAM → ... -->
<!-- ========================================================= -->

<head>
<meta charset="UTF-8">
<title>X1 – Programmatore</title>

<!-- ========================================================= -->
<!--  CSS COMPLETO                                              -->
<!-- ========================================================= -->


<style>

/* ======== STRUTTURA BASE ======== */
/* Nascondi titoli opzionali al primo avvio */
.optional-title {
  display:none;
}
body {
  font-family: Arial, sans-serif;
  background:#202020;
  color:#f0f0f0;
  margin:0;
  padding:20px;
}

.page {
  max-width:600px;
  margin:0 auto;
  background:#2b2b2b;
  border:2px solid #aa0000;
  padding:16px;
  box-sizing:border-box;
  border-radius:8px;
}

/* ======== BARRA SUPERIORE ======== */

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.top-title {
  flex:1;
  text-align:center;
  font-size:8px;
  color:#ff5555;
  font-weight:bold;
}

/* BOTTONI PICCOLI (MOSTRA / HOME) */
.top-btn {
  all: unset;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  background:#550000;
  border:1px solid #aa0000;
  color:#fff;

  width:40px;
  height:15px;
  padding:0;
  margin:0;

  font-size:4px;
  line-height:10px;
  border-radius:4px;
  cursor:pointer;
}

.top-btn:hover {
  background:#770000;
}

/* ======== SEZIONI ======== */

.section-title {
  margin:18px 0 6px;
  font-size:12px;
  font-weight:bold;
  color:#ff9999;
  border-bottom:1px solid #444;
  padding-bottom:3px;
}

/* ======== CAMPI ======== */

.full {
  width:100%;
  box-sizing:border-box;
}

label {
  font-size:10px;
  color:#cccccc;
  margin-top:6px;
  display:block;
}

input, select, textarea {
  background:#111;
  color:#f0f0f0;
  border:1px solid #555;
  padding:6px;
  font-size:12px;
  width:100%;
  box-sizing:border-box;
  border-radius:4px;
}

/* ======== RIGHE ======== */

.row {
  display:flex;
  gap:10px;
  margin-top:6px;
}

.field {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ======== PULSANTI ======== */

.buttons-row {
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.btn-file {
  background:#333;
  border:1px solid #777;
  color:#eee;
  padding:6px 4px;
  font-size:8px;
  cursor:pointer;
  width:5%;
  text-align:center;
  border-radius:4px;
}

.btn-file:hover {
  background:#444;
}

/* Classe per nascondere pulsanti opzionali */
.optional {
  display:none;
}
/* Titoli opzionali (AI, CAN, ecc.) */
.optional-title {
  display:block;
}

/* Quando nascosti */
.hidden-optional-title {
  display:none !important;
}




/* ============================================================
   SUPER ZOOM MOBILE (versione potenziata)
   Per smartphone, tablet, GitHub Pages
   ============================================================ */

@media only screen and (max-width: 1100px),
       only screen and (max-device-width: 1100px),
       only screen and (orientation: portrait),
       only screen and (-webkit-min-device-pixel-ratio: 2),
       (pointer: coarse) {

    /* ZOOM MASSICCIO */
    body {
        zoom: 2.5;   /* 280% — più grande del vecchio 210% */
    }

    /* Titoli */
    .top-title {
        font-size: 14px !important;
    }

    /* Pulsanti superiori */
    .top-btn {
        width: 60px !important;
        height: 20px !important;
        font-size: 18px !important;
        line-height: 18px !important;
    }

    /* Pulsanti 2x4 */
    .btn-file {
      width: 55px !important;
        height: 35px !important
        font-size: 16px !important;
        padding: 0px 0px !important;
    }

    /* Input, select, textarea */
    input, select, textarea {
        font-size: 18px !important;
        padding: 10px !important;
    }

    /* Label */
    label {
        font-size: 14px !important;
    }

    /* Titoli sezioni */
    .section-title {
        font-size: 16px !important;
    }
}



</style>
</head>

<!-- ========================================================= -->
<!--  BODY COMPLETO                                             -->
<!-- ========================================================= -->

<body>
<div class="page">

  <!-- ========================================================= -->
  <!--  BARRA SUPERIORE: MOSTRA / TITOLO / HOME                  -->
  <!-- ========================================================= -->
  <div class="top-bar">

      <!-- Bottone MOSTRA (piccolo, 2 righe) -->
      <button id="mostra_tutto_btn" class="top-btn">MO<br>STRA</button>

      <!-- Titolo centrale -->
      <div class="top-title">X1 – Programmatore</div>

      <!-- Bottone HOME -->
      <button id="home_btn" class="top-btn">HOME</button>

  </div>

  <!-- ========================================================= -->
  <!--  MENU (X)                                                 -->
  <!-- ========================================================= -->
  <div class="section-title">MENU (X)</div>

  <select class="full" id="menu_select">
    <option>— seleziona MENU —</option>
  </select>

  </div>

  <!-- ========================================================= -->
  <!--  SOTTOMENU (Y)                                            -->
  <!-- ========================================================= -->

    <button class="btn-file">SOTTO 8</button>

  <!-- ========================================================= -->
  <!--  PARAMETRO (Z / ZZZZ)                                     -->
  <!-- ========================================================= -->
  <div class="section-title">SELEZIONA PARAMETRO</div>

  <label>Descrizione</label>
  <input class="full" id="descrizione_parametro" type="text" placeholder="descrizione parametro">

    <button class="btn-file">PARAM 2</button>

    <button class="btn-file">PARAM 4</button>

  <div class="buttons-row optional">

  <!-- ========================================================= -->
  <!--  VALORI DEL PARAMETRO                                     -->
  <!-- ========================================================= -->
  <div class="section-title">VALORI DEL PARAMETRO</div>

  <div class="row">
    <div class="field" style="flex:2">
      <label>Seleziona valore</label>
      <select class="full" id="tendina_valori">
        <option>— seleziona valore —</option>
      </select>
    </div>

    <div class="field" style="flex:1">
      <label>Unità</label>
      <input class="full" id="unita_misura" type="text" placeholder="sec / °C / Volt">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label>Min</label>
      <input class="full" id="val_min" type="text">
    </div>
    <div class="field">
      <label>Max</label>
      <input class="full" id="val_max" type="text">
    </div>
  </div>

  <div class="buttons-row optional">
    <button class="btn-file">VAL 1</button>
    <button class="btn-file">VAL 2</button>
    <button class="btn-file">VAL 3</button>
    <button class="btn-file">VAL 4</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">VAL 5</button>
    <button class="btn-file">VAL 6</button>
    <button class="btn-file">VAL 7</button>
    <button class="btn-file">VAL 8</button>
  </div>

  <!-- ========================================================= -->
  <!--  FUNZIONI INTELLIGENTI (AI)                               -->
  <!-- ========================================================= -->
  <div class="section-title optional-title">FUNZIONI INTELLIGENTI (AI)</div>


  <div class="buttons-row optional">
    <button class="btn-file">AI1</button>
    <button class="btn-file">AI2</button>
    <button class="btn-file">AI3</button>
    <button class="btn-file">AI4</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">AI5</button>
    <button class="btn-file">AI6</button>
    <button class="btn-file">AI7</button>
    <button class="btn-file">AI8</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">AI9</button>
    <button class="btn-file">AI10</button>
    <button class="btn-file">AI11</button>

  <div class="buttons-row optional">
    <button class="btn-file">AI13</button>
    <button class="btn-file">AI14</button>
    <button class="btn-file">AI15</button>
    <button class="btn-file">AI16</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">AI17</button>
    <button class="btn-file">AI18</button>
    <button class="btn-file">AI19</button>
    <button class="btn-file">AI20</button>
  </div>

  <!-- ========================================================= -->
  <!--  CANBUS — TASTI + CAMPO TESTO                             -->
  <!-- ========================================================= -->
<div class="section-title optional-title">CANBUS</div>


  <div class="buttons-row optional">
    <button class="btn-file">CAN1</button>
    <button class="btn-file">CAN2</button>
    <button class="btn-file">CAN3</button>
    <button class="btn-file">CAN4</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">CAN5</button>
    <button class="btn-file">CAN6</button>
    <button class="btn-file">CAN7</button>
    <button class="btn-file">CAN8</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">CAN9</button>
    <button class="btn-file">CAN10</button>
    <button class="btn-file">CAN11</button>
    <button class="btn-file">CAN12</button>
  </div>
  <div class="buttons-row optional">
    <button class="btn-file">CAN13</button>
    <button class="btn-file">CAN14</button>
    <button class="btn-file">CAN15</button>
    <button class="btn-file">CAN16</button>

<textarea class="full optional" id="canbus_info" style="height:80px"></textarea>


</div>

<!-- ========================================================= -->
<!--  SCRIPT MOSTRA TUTTO + HOME                                -->
<!-- ========================================================= -->
<script>
let mostraTutto = false;
// Nascondi titoli opzionali al primo avvio
document.querySelectorAll(".optional-title").forEach(el => {
  el.classList.add("hidden-optional-title");
});

document.getElementById("mostra_tutto_btn").onclick = function() {
  mostraTutto = !mostraTutto;

  const opzionali = document.querySelectorAll(".optional");
  const titoliOpzionali = document.querySelectorAll(".optional-title");

  // Mostra / nasconde pulsanti
  opzionali.forEach(el => {
    el.style.display = mostraTutto ? "flex" : "none";
  });

  // Mostra / nasconde titoli
  titoliOpzionali.forEach(el => {
    el.classList.toggle("hidden-optional-title", !mostraTutto);
  });

  // Cambia testo del bottone
  this.innerHTML = mostraTutto ? "NA<br>SCONDI" : "MO<br>STRA";
};


document.getElementById("home_btn").onclick = function() {
  alert("HOME: qui metteremo il link alla pagina principale");
};
</script>

</body>
</html>
